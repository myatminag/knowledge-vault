name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Bun Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Run tests
        run: bun test
